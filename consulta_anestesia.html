<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Pré-Anestésica | Saúde Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#04091a;font-family:'DM Sans',sans-serif;color:#b8cce8;min-height:100vh}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#080f22}
  ::-webkit-scrollbar-thumb{background:#152035;border-radius:3px}
  input,select,textarea{font-family:'DM Sans',sans-serif}
  input::placeholder,textarea::placeholder{color:#3a5878}
  select option{background:#0c1630}
  input[type=checkbox]{accent-color:#00aaff;width:15px;height:15px;cursor:pointer}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @media print{
    .no-print{display:none!important}
    .print-only{display:block!important}
    body{background:white!important;color:#1a1a1a!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    @page{size:A4 portrait;margin:12mm 15mm}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const C = {
  bg:"#04091a",surface:"#080f22",card:"#0c1630",border:"#152035",
  accent:"#00aaff",text:"#b8cce8",textBright:"#ddeeff",textDim:"#3a5878",
  green:"#00cc88",yellow:"#f5b800",orange:"#ff7722",red:"#ff3355",
  mono:"'JetBrains Mono',monospace",sans:"'DM Sans',sans-serif",head:"'Syne',sans-serif",
};

const ANT_SYSTEMS = [
  { id:"cardiovascular", label:"Cardiovascular", icon:"🫀", color:"#ff3355",
    items:[{k:"hta",l:"Hipertensão arterial"},{k:"cardiopatia_isq",l:"Cardiopatia isquémica"},
           {k:"insuf_cardiaca",l:"Insuf. cardíaca"},{k:"arritmia",l:"Arritmia cardíaca"},
           {k:"valvulopatia",l:"Valvulopatia"},{k:"dap",l:"Doença arterial periférica"}],
    txtKey:"txt_cardiovascular"},
  { id:"respiratorio", label:"Respiratório", icon:"🫁", color:"#00aaff",
    items:[{k:"dpoc",l:"DPOC"},{k:"asma",l:"Asma brônquica"},
           {k:"insuf_resp",l:"Insuf. respiratória crónica"},{k:"apneia",l:"SAOS"}],
    txtKey:"txt_respiratorio"},
  { id:"neurologico", label:"Neurológico", icon:"🧠", color:"#aa66ff",
    items:[{k:"avc",l:"AVC"},{k:"ait",l:"AIT"},{k:"epilepsia",l:"Epilepsia"},
           {k:"demencia",l:"Demência"},{k:"parkinson",l:"Doença de Parkinson"}],
    txtKey:"txt_neurologico"},
  { id:"endocrino", label:"Endócrino / Metabólico", icon:"⚗️", color:"#f5b800",
    items:[{k:"dm_oral",l:"Diabetes (ADO)"},{k:"dm_insulina",l:"Diabetes (insulina)"},
           {k:"hipotiroidismo",l:"Hipotiroidismo"},{k:"hipertiroidismo",l:"Hipertiroidismo"}],
    txtKey:"txt_endocrino"},
  { id:"renal", label:"Renal / Hepático", icon:"🫘", color:"#ff7722",
    items:[{k:"insuf_renal",l:"Insuf. renal crónica"},{k:"dialise",l:"IRC em diálise"},
           {k:"insuf_hepatica",l:"Insuf. hepática"},{k:"cirrose",l:"Cirrose hepática"}],
    txtKey:"txt_renal"},
  { id:"hemato", label:"Hematológico / Oncológico", icon:"🩸", color:"#ff6688",
    items:[{k:"coagulopatia",l:"Coagulopatia"},{k:"anticoagulacao",l:"Anticoagulação crónica"},
           {k:"anemia_cronica",l:"Anemia crónica"},{k:"neoplasia",l:"Neoplasia activa"},
           {k:"quimio",l:"Quimio/Radioterapia"}],
    txtKey:"txt_hemato"},
];

const TECNICA_LABELS = {AG:"Anestesia Geral",AG_IOT:"AG com IOT",AG_ML:"AG com Máscara Laríngea",
  raqui:"Raquianestesia",epidural:"Epidural",plexo:"Bloqueio de Plexo",
  local:"Anestesia Local",sedacao:"Sedação/MAC",outra:"Outra"};
const RITMO_LABELS = {sinusal:"Sinusal",fa:"Fibrilhação Auricular",flutter:"Flutter Auricular",
  bav1:"BAV 1º grau",bav2:"BAV 2º grau",bav3:"BAV 3º grau",bbce:"BBCE",bbcd:"BBCD",outro:"Outro"};

/* ── Styles ── */
const iSt = {background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,color:C.textBright,
  padding:"9px 12px",fontSize:14,width:"100%",outline:"none",transition:"border-color .2s"};
const lSt = {color:C.textDim,fontSize:10,fontFamily:C.head,fontWeight:700,
  textTransform:"uppercase",letterSpacing:"0.1em",display:"block",marginBottom:5};
const cSt = {background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 22px"};
const sTSt = {fontFamily:C.head,fontSize:13,fontWeight:700,color:C.accent,textTransform:"uppercase",
  letterSpacing:"0.12em",marginBottom:18,paddingBottom:10,borderBottom:`1px solid ${C.border}`};

/* ── Components ── */
const Lbl = ({children}) => <label style={lSt}>{children}</label>;

const Inp = ({value,onChange,placeholder,type="text",style={}}) =>
  <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{...iSt,...style}}
    onFocus={e=>e.target.style.borderColor=C.accent}
    onBlur={e=>e.target.style.borderColor=C.border}/>;

const Sel = ({value,onChange,options,placeholder="Selecionar..."}) =>
  <select value={value} onChange={e=>onChange(e.target.value)} style={iSt}>
    <option value="">{placeholder}</option>
    {options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
  </select>;

const Txt = ({value,onChange,rows=3,placeholder}) =>
  <textarea value={value} onChange={e=>onChange(e.target.value)} rows={rows}
    placeholder={placeholder} style={{...iSt,resize:"vertical",lineHeight:1.6}}/>;

const Field = ({label,children,col=1}) =>
  <div style={{gridColumn:`span ${col}`}}><Lbl>{label}</Lbl>{children}</div>;

const Grid = ({cols=2,gap=16,children}) =>
  <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap}}>{children}</div>;

const Badge = ({label,color}) =>
  <span style={{background:`${color}22`,color,border:`1px solid ${color}55`,borderRadius:20,
    padding:"2px 10px",fontSize:11,fontFamily:C.head,fontWeight:700,letterSpacing:"0.05em"}}>{label}</span>;

const Btn = ({children,onClick,variant="primary",small,disabled}) => {
  const bg={primary:C.accent,danger:C.red,ghost:C.border}[variant]||C.accent;
  return <button onClick={onClick} disabled={disabled}
    style={{background:disabled?C.border:bg,color:variant==="ghost"?C.text:"#fff",border:"none",
      borderRadius:7,cursor:disabled?"not-allowed":"pointer",
      padding:small?"5px 10px":"8px 16px",fontSize:small?11:13,
      fontFamily:C.head,fontWeight:700,letterSpacing:"0.05em",transition:"opacity .2s"}}
    onMouseEnter={e=>!disabled&&(e.currentTarget.style.opacity="0.8")}
    onMouseLeave={e=>(e.currentTarget.style.opacity="1")}>{children}</button>;
};

const Checkbox = ({label,checked,onChange}) =>
  <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",
    fontSize:13,color:checked?C.textBright:C.text,userSelect:"none"}}>
    <input type="checkbox" checked={checked} onChange={e=>onChange(e.target.checked)}/>{label}
  </label>;

const RiskCard = ({title,score,pct,level,color,factors=[],desc}) =>
  <div style={{...cSt,borderLeft:`3px solid ${color}`}}>
    <div style={{fontFamily:C.head,fontSize:11,color:C.textDim,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>{title}</div>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
      {score!==undefined&&<span style={{fontFamily:C.mono,fontSize:28,fontWeight:700,color}}>{score}</span>}
      <div>{pct&&<div style={{fontFamily:C.mono,fontSize:13,color}}>{pct}</div>}
        <div style={{fontFamily:C.head,fontSize:12,color,fontWeight:700}}>{level}</div></div>
    </div>
    {desc&&<div style={{fontSize:12,color:C.text,fontStyle:"italic",marginBottom:factors.length?10:0}}>{desc}</div>}
    {factors.length>0&&<div style={{borderTop:`1px solid ${C.border}`,paddingTop:10,marginTop:6}}>
      <div style={{fontSize:10,color:C.textDim,fontFamily:C.head,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Fatores presentes</div>
      {factors.map((f,i)=><div key={i} style={{fontSize:12,color:C.text,display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
        <span style={{width:5,height:5,borderRadius:"50%",background:color,flexShrink:0}}/>{f}</div>)}
    </div>}
  </div>;

const AntSystem = ({sys,ant,setAnt}) => {
  const count = sys.items.filter(it=>ant[it.k]).length;
  const on = count > 0;
  return <div style={{...cSt,borderLeft:`3px solid ${on?sys.color:C.border}`,transition:"border-color .3s"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
      <span style={{fontSize:20}}>{sys.icon}</span>
      <span style={{fontFamily:C.head,fontSize:13,fontWeight:700,color:on?sys.color:C.textDim,
        textTransform:"uppercase",letterSpacing:"0.1em",flex:1,transition:"color .2s"}}>{sys.label}</span>
      {on&&<Badge label={`${count} activo${count>1?"s":""}`} color={sys.color}/>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(195px,1fr))",gap:"8px 20px",marginBottom:14}}>
      {sys.items.map(it=><Checkbox key={it.k} label={it.l} checked={ant[it.k]} onChange={v=>setAnt(p=>({...p,[it.k]:v}))}/>)}
    </div>
    <Lbl>Outros / Especificar</Lbl>
    <Txt value={ant[sys.txtKey]} onChange={v=>setAnt(p=>({...p,[sys.txtKey]:v}))}
      rows={2} placeholder={`Notas adicionais sobre ${sys.label.toLowerCase()}...`}/>
  </div>;
};

/* ── Lab helpers ── */
const labColor = (val,lo,hi) => { const v=parseFloat(val); if(!val||isNaN(v))return C.text; return v<lo?C.yellow:v>hi?C.red:C.green; };
const labFields = (sexo) => [
  {key:"hemoglobina",label:"Hemoglobina",unit:"g/dL",lo:sexo==="M"?13:12,hi:sexo==="M"?17:16,ref:sexo==="M"?"13–17":"12–16"},
  {key:"plaquetas",label:"Plaquetas",unit:"×10³/µL",lo:150,hi:400,ref:"150–400"},
  {key:"inr",label:"INR",unit:"",lo:0.8,hi:1.2,ref:"0.8–1.2"},
  {key:"aptt",label:"aPTT",unit:"seg",lo:25,hi:38,ref:"25–38"},
  {key:"tp",label:"TP",unit:"seg",lo:11,hi:14,ref:"11–14"},
  {key:"creatinina",label:"Creatinina",unit:"mg/dL",lo:0.5,hi:sexo==="M"?1.2:1.0,ref:sexo==="M"?"0.7–1.2":"0.5–1.0"},
  {key:"sodio",label:"Sódio",unit:"mEq/L",lo:136,hi:145,ref:"136–145"},
  {key:"potassio",label:"Potássio",unit:"mEq/L",lo:3.5,hi:5.0,ref:"3.5–5.0"},
  {key:"ureia",label:"Ureia",unit:"mg/dL",lo:10,hi:50,ref:"10–50"},
  {key:"tsh",label:"TSH",unit:"mUI/L",lo:0.4,hi:4.0,ref:"0.4–4.0"},
  {key:"t4livre",label:"T4 Livre",unit:"ng/dL",lo:0.8,hi:1.8,ref:"0.8–1.8"},
];

/* ── PrintReport ── */
const PrintReport = ({pid,idade,bmi,bmiInfo,med,ant,cirurgias,meds,alergias,ecg,labs,via,asa,rcri,airwayRisk,apfel,plano}) => {
  const today = new Date().toLocaleDateString("pt-PT");
  const fd = (d) => { try{return d?new Date(d+"T12:00:00").toLocaleDateString("pt-PT"):"—";}catch{return"—";} };
  const p = {
    wrap:{fontFamily:"Arial,Helvetica,sans-serif",color:"#1a1a1a",fontSize:"9pt",lineHeight:"1.45"},
    hdr:{textAlign:"center",borderBottom:"2pt solid #1a3a6b",paddingBottom:"8pt",marginBottom:"12pt"},
    sec:{marginBottom:"10pt",pageBreakInside:"avoid"},
    secT:{fontSize:"8pt",fontWeight:"bold",color:"#1a3a6b",textTransform:"uppercase",letterSpacing:"0.08em",
      borderBottom:"0.5pt solid #1a3a6b",paddingBottom:"2pt",marginBottom:"5pt"},
    row:{display:"flex",gap:"4pt",marginBottom:"2pt"},
    lbl:{fontSize:"7pt",fontWeight:"bold",color:"#777",textTransform:"uppercase",letterSpacing:"0.05em",minWidth:"85pt",flexShrink:0},
    val:{fontSize:"9pt",color:"#1a1a1a"},
    tbl:{width:"100%",borderCollapse:"collapse",fontSize:"7.5pt",marginBottom:"4pt"},
    th:{backgroundColor:"#eef2f8",border:"0.5pt solid #ccc",padding:"2.5pt 4pt",textAlign:"left",
      fontWeight:"bold",color:"#333",fontSize:"7pt",textTransform:"uppercase",letterSpacing:"0.04em"},
    td:{border:"0.5pt solid #ddd",padding:"2.5pt 4pt",color:"#1a1a1a",verticalAlign:"top"},
    chk:(v)=>({fontSize:"7.5pt",color:v?"#1a1a1a":"#bbb",display:"inline-flex",alignItems:"center",gap:"3pt",marginRight:"10pt",marginBottom:"3pt"}),
  };
  const rc = (l) => l==="Baixo"||l==="Muito Baixo"?"#006633":l==="Moderado"?"#c87000":"#cc0000";
  const rb = (l) => l==="Baixo"||l==="Muito Baixo"?"#f0fff8":l==="Moderado"?"#fffbef":"#fff0f2";
  const rbd = (l) => l==="Baixo"||l==="Muito Baixo"?"#00cc88":l==="Moderado"?"#f5b800":"#ff3355";

  return <div className="print-only" style={{display:"none"}}>
    <div style={p.wrap}>
      <div style={p.hdr}>
        <div style={{fontSize:"12pt",fontWeight:"bold",color:"#1a3a6b",letterSpacing:"0.08em",marginBottom:"2pt"}}>SERVIÇO DE ANESTESIOLOGIA</div>
        <div style={{fontSize:"10pt",fontWeight:"bold",letterSpacing:"0.06em",marginBottom:"3pt"}}>FICHA DE CONSULTA PRÉ-ANESTÉSICA</div>
        <div style={{fontSize:"7pt",color:"#777"}}>Documento gerado em {today}</div>
      </div>

      {/* 1. Identificação */}
      <div style={p.sec}>
        <div style={p.secT}>1. Identificação do Doente</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2pt 16pt"}}>
          <div style={p.row}><span style={p.lbl}>Nome</span><span style={{...p.val,fontWeight:"bold"}}>{pid.nome||"—"}</span></div>
          <div style={p.row}><span style={p.lbl}>Nº Processo</span><span style={p.val}>{pid.processo||"—"}</span></div>
          <div style={p.row}><span style={p.lbl}>Data Nasc.</span><span style={p.val}>{fd(pid.dob)}</span></div>
          <div style={p.row}><span style={p.lbl}>Idade / Sexo</span><span style={p.val}>{idade?`${idade} anos`:"—"} / {pid.sexo==="M"?"Masculino":pid.sexo==="F"?"Feminino":"—"}</span></div>
          <div style={p.row}><span style={p.lbl}>Altura / Peso</span><span style={p.val}>{med.altura?`${med.altura} cm`:"—"} / {med.peso?`${med.peso} kg`:"—"}</span></div>
          <div style={p.row}><span style={p.lbl}>IMC</span><span style={{...p.val,fontWeight:"bold"}}>{bmi?`${bmi} kg/m²`:"—"}{bmiInfo?` — ${bmiInfo.label}`:""}</span></div>
        </div>
      </div>

      {/* 2. Antecedentes */}
      <div style={p.sec}>
        <div style={p.secT}>2. Antecedentes Pessoais</div>
        {ANT_SYSTEMS.map(sys => {
          const active = sys.items.filter(it=>ant[it.k]);
          return <div key={sys.id} style={{marginBottom:"5pt",paddingBottom:"5pt",borderBottom:"0.3pt solid #eee"}}>
            <div style={{fontSize:"7.5pt",fontWeight:"bold",color:active.length>0?"#1a3a6b":"#aaa",
              marginBottom:"2pt",textTransform:"uppercase",letterSpacing:"0.05em"}}>{sys.label}</div>
            <div style={{display:"flex",flexWrap:"wrap"}}>
              {sys.items.map(it=><span key={it.k} style={p.chk(ant[it.k])}>{ant[it.k]?"☑":"☐"} {it.l}</span>)}
            </div>
            {ant[sys.txtKey]&&<div style={{fontSize:"7.5pt",color:"#444",fontStyle:"italic",marginTop:"2pt",paddingLeft:"10pt"}}>↳ {ant[sys.txtKey]}</div>}
          </div>;
        })}
        {ant.txt_outros&&<div style={{fontSize:"8pt",color:"#333",marginTop:"4pt"}}><strong>Outros:</strong> {ant.txt_outros}</div>}
      </div>

      {/* 3. Cirurgias */}
      <div style={p.sec}>
        <div style={p.secT}>3. Cirurgias Anteriores</div>
        {cirurgias.length>0
          ?<table style={p.tbl}><thead><tr>
              <th style={{...p.th,width:"12%"}}>Data</th><th style={{...p.th,width:"30%"}}>Descrição</th>
              <th style={{...p.th,width:"22%"}}>Técnica</th><th style={{...p.th,width:"36%"}}>Intercorrências</th>
            </tr></thead><tbody>
              {cirurgias.map((c,i)=><tr key={i}>
                <td style={p.td}>{fd(c.data)}</td><td style={p.td}>{c.descricao||"—"}</td>
                <td style={p.td}>{TECNICA_LABELS[c.tecnica]||c.tecnica||"—"}</td>
                <td style={p.td}>{c.intercorrencias||"Sem intercorrências"}</td>
              </tr>)}
            </tbody></table>
          :<div style={{fontSize:"8pt",color:"#999",fontStyle:"italic"}}>Sem cirurgias anteriores</div>}
      </div>

      {/* 4. Medicação */}
      <div style={p.sec}>
        <div style={p.secT}>4. Medicação Habitual e Alergias</div>
        {meds.some(m=>m.nome)
          ?<table style={{...p.tbl,marginBottom:"5pt"}}><thead><tr>
              <th style={{...p.th,width:"35%"}}>Medicamento</th><th style={{...p.th,width:"20%"}}>Dose</th>
              <th style={{...p.th,width:"25%"}}>Frequência</th><th style={{...p.th,width:"20%"}}>Via</th>
            </tr></thead><tbody>
              {meds.filter(m=>m.nome).map((m,i)=><tr key={i}>
                <td style={p.td}>{m.nome}</td><td style={p.td}>{m.dose||"—"}</td>
                <td style={p.td}>{m.freq||"—"}</td><td style={p.td}>{m.via||"—"}</td>
              </tr>)}
            </tbody></table>
          :<div style={{fontSize:"8pt",color:"#999",fontStyle:"italic",marginBottom:"5pt"}}>Sem medicação registada</div>}
        {alergias.some(a=>a.substancia)
          ?<div style={{backgroundColor:"#fff5f5",border:"0.75pt solid #ffbbbb",borderRadius:"3pt",padding:"4pt 8pt",fontSize:"8pt"}}>
            <strong style={{color:"#cc0000"}}>⚠ ALERGIAS: </strong>
            {alergias.filter(a=>a.substancia).map((a,i)=><span key={i}>{a.substancia}{a.reacao?` (${a.reacao})`:""}&nbsp;&nbsp;</span>)}
          </div>
          :<div style={{fontSize:"8pt",color:"#555"}}>Alergias: <strong>Não conhecidas</strong></div>}
      </div>

      {/* 5. Exames */}
      <div style={p.sec}>
        <div style={p.secT}>5. Exames Auxiliares de Diagnóstico</div>
        {(ecg.ritmo||ecg.resultado||ecg.fc)&&
          <div style={{marginBottom:"6pt",padding:"4pt 8pt",background:"#f8faff",border:"0.5pt solid #d0ddf0",borderRadius:"3pt"}}>
            <div style={{fontSize:"7.5pt",fontWeight:"bold",color:"#555",marginBottom:"2pt"}}>ECG{ecg.data?` — ${fd(ecg.data)}`:""}</div>
            <div style={{fontSize:"8.5pt"}}>{[RITMO_LABELS[ecg.ritmo]||ecg.ritmo,ecg.fc?`FC ${ecg.fc} bpm`:"",ecg.pr?`PR ${ecg.pr} ms`:"",ecg.qrs?`QRS ${ecg.qrs} ms`:"",ecg.qtc?`QTc ${ecg.qtc} ms`:""].filter(Boolean).join(" · ")}</div>
            {ecg.resultado&&<div style={{fontSize:"8pt",color:"#444",fontStyle:"italic",marginTop:"2pt"}}>{ecg.resultado}</div>}
          </div>}
        {(()=>{
          const fields=labFields(pid.sexo).filter(lf=>labs[lf.key]);
          if(!fields.length)return <div style={{fontSize:"8pt",color:"#999",fontStyle:"italic"}}>Sem análises registadas</div>;
          return <div>
            <div style={{fontSize:"7.5pt",fontWeight:"bold",color:"#555",marginBottom:"3pt"}}>Análises{labs.data?` — ${fd(labs.data)}`:""}</div>
            <table style={p.tbl}><thead><tr>{fields.map(lf=><th key={lf.key} style={p.th}>{lf.label}{lf.unit?` (${lf.unit})`:""}</th>)}</tr></thead>
            <tbody>
              <tr>{fields.map(lf=>{const v=parseFloat(labs[lf.key]);const abn=!isNaN(v)&&(v<lf.lo||v>lf.hi);
                return <td key={lf.key} style={{...p.td,fontWeight:abn?"bold":"normal",color:abn?"#cc0000":"#1a1a1a",backgroundColor:abn?"#fff0f0":"white",textAlign:"center"}}>
                  {labs[lf.key]}{abn?(v<lf.lo?" ↓":" ↑"):""}</td>;})}</tr>
              <tr>{fields.map(lf=><td key={lf.key} style={{...p.td,fontSize:"6.5pt",color:"#aaa",fontStyle:"italic",textAlign:"center",backgroundColor:"#fafafa"}}>Ref: {lf.ref}</td>)}</tr>
            </tbody></table>
          </div>;
        })()}
      </div>

      {/* 6. Via Aérea */}
      <div style={p.sec}>
        <div style={p.secT}>6. Avaliação da Via Aérea</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"4pt 20pt",marginBottom:"5pt"}}>
          {via.mobilidade&&<span style={{fontSize:"8pt"}}><strong>Mobilidade cervical:</strong> {via.mobilidade==="normal"?"Normal (>35°)":via.mobilidade==="reduzida"?"Reduzida (15–35°)":"Muito reduzida (<15°)"}</span>}
          {via.abertura&&<span style={{fontSize:"8pt"}}><strong>Abertura boca:</strong> {via.abertura}</span>}
          {via.mallampati&&<span style={{fontSize:"8pt"}}><strong>Mallampati:</strong> Classe {via.mallampati}</span>}
          {via.dtm&&<span style={{fontSize:"8pt"}}><strong>DTM:</strong> {via.dtm}</span>}
          {via.protusao&&<span style={{fontSize:"8pt"}}><strong>Bite test:</strong> Classe {via.protusao}</span>}
        </div>
        {via.obs&&<div style={{fontSize:"8pt",fontStyle:"italic",color:"#444",marginBottom:"5pt"}}>Obs: {via.obs}</div>}
        <div style={{display:"inline-flex",alignItems:"center",gap:"6pt",padding:"3pt 10pt",
          borderRadius:"3pt",backgroundColor:rb(airwayRisk.level),border:`0.75pt solid ${rbd(airwayRisk.level)}`}}>
          <span style={{fontSize:"7pt",fontWeight:"bold",color:"#555"}}>RISCO GLOBAL:</span>
          <span style={{fontSize:"8.5pt",fontWeight:"bold",color:rc(airwayRisk.level)}}>{airwayRisk.level} — {airwayRisk.desc}</span>
        </div>
      </div>

      {/* 7. Índices */}
      <div style={p.sec}>
        <div style={p.secT}>7. Índices de Risco Anestésico</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"5pt"}}>
          {asa&&<div style={{padding:"5pt 7pt",border:"0.5pt solid #ddd",borderRadius:"3pt",borderLeft:"2pt solid #1a3a6b"}}>
            <div style={{fontSize:"6.5pt",fontWeight:"bold",color:"#777",textTransform:"uppercase",marginBottom:"2pt"}}>ASA</div>
            <div style={{fontSize:"13pt",fontWeight:"bold"}}>ASA {asa}</div>
          </div>}
          {bmi&&<div style={{padding:"5pt 7pt",border:"0.5pt solid #ddd",borderRadius:"3pt",borderLeft:"2pt solid #1a3a6b"}}>
            <div style={{fontSize:"6.5pt",fontWeight:"bold",color:"#777",textTransform:"uppercase",marginBottom:"2pt"}}>IMC</div>
            <div style={{fontSize:"12pt",fontWeight:"bold"}}>{bmi}</div>
            <div style={{fontSize:"7pt",color:"#555"}}>{bmiInfo?.label}</div>
          </div>}
          <div style={{padding:"5pt 7pt",border:"0.5pt solid #ddd",borderRadius:"3pt",borderLeft:`2pt solid ${rbd(rcri.level)}`}}>
            <div style={{fontSize:"6.5pt",fontWeight:"bold",color:"#777",textTransform:"uppercase",marginBottom:"2pt"}}>RCRI (Lee)</div>
            <div style={{fontSize:"13pt",fontWeight:"bold"}}>{rcri.score} <span style={{fontSize:"8pt",fontWeight:"normal"}}>{rcri.pct}</span></div>
            <div style={{fontSize:"7pt",fontWeight:"bold",color:rc(rcri.level)}}>{rcri.level}</div>
            {rcri.factors.length>0&&<div style={{fontSize:"6pt",color:"#888",marginTop:"2pt"}}>{rcri.factors.join(" · ")}</div>}
          </div>
          {apfel&&<div style={{padding:"5pt 7pt",border:"0.5pt solid #ddd",borderRadius:"3pt",borderLeft:`2pt solid ${rbd(apfel.level)}`}}>
            <div style={{fontSize:"6.5pt",fontWeight:"bold",color:"#777",textTransform:"uppercase",marginBottom:"2pt"}}>Apfel (NVPO)</div>
            <div style={{fontSize:"13pt",fontWeight:"bold"}}>{apfel.score} <span style={{fontSize:"8pt",fontWeight:"normal"}}>{apfel.risk}</span></div>
            <div style={{fontSize:"7pt",fontWeight:"bold",color:rc(apfel.level)}}>{apfel.level}</div>
          </div>}
        </div>
      </div>

      {/* 8. Plano */}
      <div style={{...p.sec,marginBottom:"16pt"}}>
        <div style={p.secT}>8. Plano Anestésico Proposto</div>
        <div style={{minHeight:"55pt",border:"0.5pt solid #ccc",borderRadius:"3pt",padding:"5pt 8pt",fontSize:"8.5pt",whiteSpace:"pre-wrap"}}>{plano||" "}</div>
      </div>

      {/* Assinatura */}
      <div style={{borderTop:"0.5pt solid #ccc",paddingTop:"10pt",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"30pt"}}>
        <div style={{textAlign:"center"}}><div style={{height:"28pt"}}/><div style={{borderTop:"0.75pt solid #333",paddingTop:"4pt",fontSize:"7pt",color:"#666"}}>Médico Anestesiologista</div></div>
        <div style={{textAlign:"center"}}><div style={{height:"28pt"}}/><div style={{borderTop:"0.75pt solid #333",paddingTop:"4pt",fontSize:"7pt",color:"#666"}}>Cédula Profissional / Data</div></div>
      </div>
      <div style={{marginTop:"8pt",textAlign:"center",fontSize:"6pt",color:"#ccc",borderTop:"0.3pt solid #eee",paddingTop:"5pt"}}>
        Ficha de Consulta Pré-Anestésica · {today}
      </div>
    </div>
  </div>;
};

/* ── MAIN APP ── */
function App() {
  const [tab, setTab] = useState(0);
  const [pid, setPid] = useState({nome:"",processo:"",dob:"",sexo:""});
  const [med, setMed] = useState({altura:"",peso:""});
  const [ant, setAnt] = useState({
    hta:false,cardiopatia_isq:false,insuf_cardiaca:false,arritmia:false,valvulopatia:false,dap:false,txt_cardiovascular:"",
    dpoc:false,asma:false,insuf_resp:false,apneia:false,txt_respiratorio:"",
    avc:false,ait:false,epilepsia:false,demencia:false,parkinson:false,txt_neurologico:"",
    dm_oral:false,dm_insulina:false,hipotiroidismo:false,hipertiroidismo:false,txt_endocrino:"",
    insuf_renal:false,dialise:false,insuf_hepatica:false,cirrose:false,txt_renal:"",
    coagulopatia:false,anticoagulacao:false,anemia_cronica:false,neoplasia:false,quimio:false,txt_hemato:"",txt_outros:"",
  });
  const [cirurgias, setCirurgias] = useState([]);
  const [meds, setMeds] = useState([{id:1,nome:"",dose:"",freq:"",via:""}]);
  const [alergias, setAlergias] = useState([]);
  const [ecg, setEcg] = useState({data:"",ritmo:"",fc:"",pr:"",qrs:"",qtc:"",resultado:""});
  const [labs, setLabs] = useState({data:"",hemoglobina:"",plaquetas:"",inr:"",aptt:"",tp:"",creatinina:"",sodio:"",potassio:"",ureia:"",tsh:"",t4livre:""});
  const [via, setVia] = useState({mobilidade:"",abertura:"",mallampati:"",dtm:"",protusao:"",obs:""});
  const [asa, setAsa] = useState("");
  const [tipoCir, setTipoCir] = useState("");
  const [apfelOpts, setApfelOpts] = useState({opioides:false,ponv:false,fumador:false});
  const [plano, setPlano] = useState("");

  const bmi = useMemo(()=>{const h=parseFloat(med.altura)/100,p=parseFloat(med.peso);return h>0.5&&p>0?(p/(h*h)).toFixed(1):null;},[med]);
  const bmiInfo = useMemo(()=>{if(!bmi)return null;const b=parseFloat(bmi);
    if(b<18.5)return{label:"Baixo Peso",color:C.yellow};if(b<25)return{label:"Peso Normal",color:C.green};
    if(b<30)return{label:"Excesso de Peso",color:C.yellow};if(b<35)return{label:"Obesidade Grau I",color:C.orange};
    if(b<40)return{label:"Obesidade Grau II",color:C.red};return{label:"Obesidade Mórbida",color:"#cc0033"};
  },[bmi]);
  const idade = useMemo(()=>{if(!pid.dob)return null;return Math.floor((Date.now()-new Date(pid.dob).getTime())/(1000*60*60*24*365.25));},[pid.dob]);

  const rcri = useMemo(()=>{
    let s=0; const f=[];
    if(["intraperitoneal","intratoracica","vascular_sup"].includes(tipoCir)){s++;f.push("Cirurgia de alto risco");}
    if(ant.cardiopatia_isq){s++;f.push("Cardiopatia isquémica");}
    if(ant.insuf_cardiaca){s++;f.push("Insuf. cardíaca");}
    if(ant.avc||ant.ait){s++;f.push("Doença cerebrovascular");}
    if(ant.dm_insulina){s++;f.push("DM insulino-dependente");}
    const cr=parseFloat(labs.creatinina);if(!isNaN(cr)&&cr>2.0){s++;f.push(`Creatinina ${cr} mg/dL`);}
    const t=[{pct:"0.4%",level:"Muito Baixo",color:C.green},{pct:"1.0%",level:"Baixo",color:C.green},{pct:"2.4%",level:"Moderado",color:C.yellow},{pct:"5.4%",level:"Elevado",color:C.red}];
    return{score:s,factors:f,...t[Math.min(s,3)]};
  },[ant,labs.creatinina,tipoCir]);

  const airwayRisk = useMemo(()=>{
    let p=0;
    if(via.mallampati==="III")p+=1;if(via.mallampati==="IV")p+=3;
    if(via.abertura==="<3cm")p+=2;else if(via.abertura==="3-4cm")p+=1;
    if(via.mobilidade==="muito_red")p+=2;else if(via.mobilidade==="reduzida")p+=1;
    if(via.dtm==="<6cm")p+=2;else if(via.dtm==="6-6.5cm")p+=1;
    if(via.protusao==="C")p+=1;
    if(p===0)return{level:"Baixo",color:C.green,desc:"Via aérea provavelmente normal"};
    if(p<=2)return{level:"Moderado",color:C.yellow,desc:"Pré-oxigenação prolongada. Ter plano B preparado"};
    if(p<=4)return{level:"Elevado",color:C.orange,desc:"Preparar equipamento VAD. Informar equipa"};
    return{level:"Muito Elevado",color:C.red,desc:"VAD provável — seguir algoritmo DAS/ASA"};
  },[via]);

  const apfel = useMemo(()=>{
    if(!pid.sexo)return null;
    let s=0;if(pid.sexo==="F")s++;if(!apfelOpts.fumador)s++;if(apfelOpts.ponv)s++;if(apfelOpts.opioides)s++;
    const r=["10%","21%","39%","61%","79%"],cl=[C.green,C.green,C.yellow,C.orange,C.red],d=["Muito Baixo","Baixo","Moderado","Elevado","Muito Elevado"];
    return{score:s,risk:r[s],color:cl[s],level:d[s]};
  },[pid.sexo,apfelOpts]);

  const addRow=(set,tpl)=>set(p=>[...p,{id:Date.now(),...tpl}]);
  const delRow=(set,id)=>set(p=>p.filter(r=>r.id!==id));
  const updRow=(set,id,k,v)=>set(p=>p.map(r=>r.id===id?{...r,[k]:v}:r));

  const TABS=["Identificação","Antecedentes","Cirurgias","Medicação & Alergias","Exames","Via Aérea","Índices de Risco"];
  const tecOpts=[{v:"AG",l:"Anestesia Geral"},{v:"AG_IOT",l:"AG com IOT"},{v:"AG_ML",l:"AG com Máscara Laríngea"},{v:"raqui",l:"Raquianestesia"},{v:"epidural",l:"Epidural"},{v:"plexo",l:"Bloqueio de Plexo"},{v:"local",l:"Anestesia Local"},{v:"sedacao",l:"Sedação/MAC"},{v:"outra",l:"Outra"}];

  const sections = [
    /* 0 — Identificação */
    <div key={0} style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={cSt}>
        <div style={sTSt}>Dados do Doente</div>
        <Grid cols={2} gap={16}>
          <Field label="Nome Completo" col={2}><Inp value={pid.nome} onChange={v=>setPid(p=>({...p,nome:v}))} placeholder="Nome completo"/></Field>
          <Field label="Número de Processo"><Inp value={pid.processo} onChange={v=>setPid(p=>({...p,processo:v}))} placeholder="Ex: 123456"/></Field>
          <Field label="Sexo"><Sel value={pid.sexo} onChange={v=>setPid(p=>({...p,sexo:v}))} options={[{v:"M",l:"Masculino"},{v:"F",l:"Feminino"}]}/></Field>
          <Field label="Data de Nascimento"><Inp type="date" value={pid.dob} onChange={v=>setPid(p=>({...p,dob:v}))}/></Field>
          <Field label="Idade"><div style={{...iSt,color:idade?C.textBright:C.textDim,fontFamily:C.mono,display:"flex",alignItems:"center"}}>{idade?`${idade} anos`:"—"}</div></Field>
        </Grid>
      </div>
      <div style={cSt}>
        <div style={sTSt}>Antropometria</div>
        <Grid cols={3} gap={16}>
          <Field label="Altura (cm)"><Inp type="number" value={med.altura} onChange={v=>setMed(p=>({...p,altura:v}))} placeholder="170"/></Field>
          <Field label="Peso (kg)"><Inp type="number" value={med.peso} onChange={v=>setMed(p=>({...p,peso:v}))} placeholder="70"/></Field>
          <Field label="IMC (kg/m²)">
            <div style={{...iSt,fontFamily:C.mono,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{color:bmiInfo?bmiInfo.color:C.textDim,fontWeight:700,fontSize:16}}>{bmi||"—"}</span>
              {bmiInfo&&<Badge label={bmiInfo.label} color={bmiInfo.color}/>}
            </div>
          </Field>
        </Grid>
      </div>
    </div>,

    /* 1 — Antecedentes */
    <div key={1} style={{display:"flex",flexDirection:"column",gap:14}}>
      {ANT_SYSTEMS.map(sys=><AntSystem key={sys.id} sys={sys} ant={ant} setAnt={setAnt}/>)}
      <div style={cSt}><div style={sTSt}>Outros Antecedentes</div>
        <Txt value={ant.txt_outros} onChange={v=>setAnt(p=>({...p,txt_outros:v}))} rows={3} placeholder="Outros antecedentes relevantes não categorizados acima..."/>
      </div>
    </div>,

    /* 2 — Cirurgias */
    <div key={2} style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={cSt}>
        <div style={{...sTSt,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>Cirurgias Anteriores</span>
          <Btn small onClick={()=>addRow(setCirurgias,{descricao:"",tecnica:"",data:"",intercorrencias:""})}>+ Adicionar</Btn>
        </div>
        {cirurgias.length===0&&<div style={{textAlign:"center",color:C.textDim,padding:"20px 0",fontSize:13,fontStyle:"italic"}}>Sem cirurgias registadas</div>}
        {cirurgias.map((c,i)=><div key={c.id} style={{...cSt,background:C.surface,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontFamily:C.head,fontSize:11,color:C.textDim,fontWeight:700,textTransform:"uppercase"}}>Cirurgia #{i+1}</span>
            <Btn small variant="danger" onClick={()=>delRow(setCirurgias,c.id)}>Remover</Btn>
          </div>
          <Grid cols={2} gap={12}>
            <Field label="Descrição" col={2}><Inp value={c.descricao} onChange={v=>updRow(setCirurgias,c.id,"descricao",v)} placeholder="Ex: Colecistectomia laparoscópica"/></Field>
            <Field label="Técnica Anestésica"><Sel value={c.tecnica} onChange={v=>updRow(setCirurgias,c.id,"tecnica",v)} options={tecOpts}/></Field>
            <Field label="Data"><Inp type="date" value={c.data} onChange={v=>updRow(setCirurgias,c.id,"data",v)}/></Field>
            <Field label="Intercorrências" col={2}><Txt value={c.intercorrencias} onChange={v=>updRow(setCirurgias,c.id,"intercorrencias",v)} rows={2} placeholder="Ex: Intubação difícil... (vazio se sem intercorrências)"/></Field>
          </Grid>
        </div>)}
      </div>
    </div>,

    /* 3 — Medicação */
    <div key={3} style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={cSt}>
        <div style={{...sTSt,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>Medicação Habitual</span>
          <Btn small onClick={()=>addRow(setMeds,{nome:"",dose:"",freq:"",via:""})}>+ Adicionar</Btn>
        </div>
        {meds.map(m=><div key={m.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr auto",gap:10,marginBottom:10,alignItems:"end"}}>
          <div><Lbl>Medicamento</Lbl><Inp value={m.nome} onChange={v=>updRow(setMeds,m.id,"nome",v)} placeholder="Nome do fármaco"/></div>
          <div><Lbl>Dose</Lbl><Inp value={m.dose} onChange={v=>updRow(setMeds,m.id,"dose",v)} placeholder="10mg"/></div>
          <div><Lbl>Freq.</Lbl><Inp value={m.freq} onChange={v=>updRow(setMeds,m.id,"freq",v)} placeholder="2×/dia"/></div>
          <div><Lbl>Via</Lbl><Sel value={m.via} onChange={v=>updRow(setMeds,m.id,"via",v)} options={[{v:"oral",l:"Oral"},{v:"sc",l:"SC"},{v:"iv",l:"IV"},{v:"inal",l:"Inalatória"},{v:"outra",l:"Outra"}]}/></div>
          <div style={{paddingBottom:1}}><Btn small variant="danger" onClick={()=>delRow(setMeds,m.id)}>✕</Btn></div>
        </div>)}
      </div>
      <div style={cSt}>
        <div style={{...sTSt,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>Alergias Medicamentosas</span>
          <Btn small onClick={()=>addRow(setAlergias,{substancia:"",reacao:""})}>+ Adicionar</Btn>
        </div>
        {alergias.length===0&&<div style={{color:C.textDim,fontSize:13,fontStyle:"italic"}}>Nenhuma alergia registada</div>}
        {alergias.map(a=><div key={a.id} style={{display:"grid",gridTemplateColumns:"1fr 2fr auto",gap:10,marginBottom:10,alignItems:"end"}}>
          <div><Lbl>Substância</Lbl><Inp value={a.substancia} onChange={v=>updRow(setAlergias,a.id,"substancia",v)} placeholder="Ex: Penicilina"/></div>
          <div><Lbl>Reação</Lbl><Inp value={a.reacao} onChange={v=>updRow(setAlergias,a.id,"reacao",v)} placeholder="Ex: Anafilaxia..."/></div>
          <div style={{paddingBottom:1}}><Btn small variant="danger" onClick={()=>delRow(setAlergias,a.id)}>✕</Btn></div>
        </div>)}
      </div>
    </div>,

    /* 4 — Exames */
    <div key={4} style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={cSt}>
        <div style={sTSt}>Eletrocardiograma</div>
        <Grid cols={3} gap={14}>
          <Field label="Data"><Inp type="date" value={ecg.data} onChange={v=>setEcg(p=>({...p,data:v}))}/></Field>
          <Field label="Ritmo"><Sel value={ecg.ritmo} onChange={v=>setEcg(p=>({...p,ritmo:v}))}
            options={[{v:"sinusal",l:"Sinusal"},{v:"fa",l:"Fibrilhação auricular"},{v:"flutter",l:"Flutter auricular"},{v:"bav1",l:"BAV 1º grau"},{v:"bav2",l:"BAV 2º grau"},{v:"bav3",l:"BAV 3º grau"},{v:"bbce",l:"BBCE"},{v:"bbcd",l:"BBCD"},{v:"outro",l:"Outro"}]}/></Field>
          <Field label="FC (bpm)"><Inp type="number" value={ecg.fc} onChange={v=>setEcg(p=>({...p,fc:v}))} placeholder="72"/></Field>
          <Field label="PR (ms)"><Inp type="number" value={ecg.pr} onChange={v=>setEcg(p=>({...p,pr:v}))} placeholder="120–200"/></Field>
          <Field label="QRS (ms)"><Inp type="number" value={ecg.qrs} onChange={v=>setEcg(p=>({...p,qrs:v}))} placeholder="&lt;120"/></Field>
          <Field label="QTc (ms)"><Inp type="number" value={ecg.qtc} onChange={v=>setEcg(p=>({...p,qtc:v}))} placeholder="&lt;440"/></Field>
          <Field label="Resultado / Interpretação" col={3}><Txt value={ecg.resultado} onChange={v=>setEcg(p=>({...p,resultado:v}))} rows={2} placeholder="Ex: Ritmo sinusal regular sem alterações da repolarização"/></Field>
        </Grid>
      </div>
      <div style={cSt}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
          <span style={{fontFamily:C.head,fontSize:13,fontWeight:700,color:C.accent,textTransform:"uppercase",letterSpacing:"0.12em"}}>Análises Laboratoriais</span>
          <div><Lbl>Data</Lbl><Inp type="date" value={labs.data} onChange={v=>setLabs(p=>({...p,data:v}))} style={{width:150}}/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:14}}>
          {labFields(pid.sexo).map(lf=>{
            const col=labColor(labs[lf.key],lf.lo,lf.hi); const hv=labs[lf.key]!=="";
            return <div key={lf.key}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <Lbl>{lf.label}</Lbl>{lf.unit&&<span style={{fontSize:9,color:C.textDim,fontFamily:C.mono}}>{lf.unit}</span>}
              </div>
              <div style={{position:"relative"}}>
                <Inp type="number" value={labs[lf.key]} onChange={v=>setLabs(p=>({...p,[lf.key]:v}))} placeholder={lf.ref}
                  style={{color:hv?col:C.textDim,fontFamily:C.mono,fontWeight:hv?700:400,borderColor:hv&&col!==C.green?col:C.border}}/>
                {hv&&col!==C.green&&<span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:10,color:col,fontWeight:700}}>{parseFloat(labs[lf.key])<lf.lo?"↓":"↑"}</span>}
              </div>
              <div style={{fontSize:9,color:C.textDim,marginTop:3,fontFamily:C.mono}}>Ref: {lf.ref}</div>
            </div>;
          })}
        </div>
      </div>
    </div>,

    /* 5 — Via Aérea */
    <div key={5} style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={cSt}>
        <div style={sTSt}>Avaliação da Via Aérea</div>
        <Grid cols={2} gap={16}>
          <Field label="Mobilidade Cervical"><Sel value={via.mobilidade} onChange={v=>setVia(p=>({...p,mobilidade:v}))} options={[{v:"normal",l:"Normal (>35°)"},{v:"reduzida",l:"Reduzida (15–35°)"},{v:"muito_red",l:"Muito reduzida (<15°)"}]}/></Field>
          <Field label="Abertura de Boca"><Sel value={via.abertura} onChange={v=>setVia(p=>({...p,abertura:v}))} options={[{v:">4cm",l:">4 cm (normal)"},{v:"3-4cm",l:"3–4 cm (ligeiramente reduzida)"},{v:"<3cm",l:"<3 cm (significativamente reduzida)"}]}/></Field>
          <Field label="Distância Tiromentoniana"><Sel value={via.dtm} onChange={v=>setVia(p=>({...p,dtm:v}))} options={[{v:">6.5cm",l:">6.5 cm (normal)"},{v:"6-6.5cm",l:"6–6.5 cm (borderline)"},{v:"<6cm",l:"<6 cm (reduzida)"}]}/></Field>
          <Field label="Protusão Mandibular"><Sel value={via.protusao} onChange={v=>setVia(p=>({...p,protusao:v}))} options={[{v:"A",l:"Classe A — inferiores ultrapassam superiores"},{v:"B",l:"Classe B — incisivos nivelam"},{v:"C",l:"Classe C — impossível ultrapassar"}]}/></Field>
        </Grid>
      </div>
      <div style={cSt}>
        <div style={sTSt}>Classificação de Mallampati</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          {[{v:"I",desc:"Palato mole, úvula, pilares e amígdalas visíveis",d:"Fácil"},{v:"II",desc:"Palato mole e úvula visíveis",d:"Moderado"},{v:"III",desc:"Apenas base da úvula visível",d:"Difícil"},{v:"IV",desc:"Palato mole não visível",d:"Muito Difícil"}].map(m=>{
            const sel=via.mallampati===m.v;
            const mc=m.v==="I"?C.green:m.v==="II"?C.yellow:m.v==="III"?C.orange:C.red;
            return <div key={m.v} onClick={()=>setVia(p=>({...p,mallampati:m.v}))}
              style={{...cSt,cursor:"pointer",textAlign:"center",borderColor:sel?mc:C.border,background:sel?`${mc}18`:C.surface,transition:"all .2s"}}>
              <div style={{fontFamily:C.mono,fontSize:28,fontWeight:700,color:sel?mc:C.textDim,marginBottom:5}}>{m.v}</div>
              <div style={{fontSize:10,fontFamily:C.head,fontWeight:700,color:mc,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}}>{m.d}</div>
              <div style={{fontSize:11,color:C.text,lineHeight:1.4}}>{m.desc}</div>
            </div>;
          })}
        </div>
      </div>
      <div style={cSt}><div style={sTSt}>Observações</div>
        <Txt value={via.obs} onChange={v=>setVia(p=>({...p,obs:v}))} rows={3} placeholder="Dentes móveis, próteses, microstomia, cicatrizes cervicais, stridor..."/>
      </div>
    </div>,

    /* 6 — Índices */
    <div key={6} style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={cSt}>
        <div style={sTSt}>Parâmetros para Cálculo</div>
        <Grid cols={3} gap={16}>
          <Field label="Classificação ASA"><Sel value={asa} onChange={setAsa} options={[{v:"I",l:"ASA I — Saudável"},{v:"II",l:"ASA II — Ligeira"},{v:"III",l:"ASA III — Grave"},{v:"IV",l:"ASA IV — Risco de vida"},{v:"V",l:"ASA V — Moribundo"},{v:"E",l:"ASA E — Emergência"}]}/></Field>
          <Field label="Tipo de Cirurgia"><Sel value={tipoCir} onChange={setTipoCir} options={[{v:"superficial",l:"Superficial / endoscópica"},{v:"ortopedica_minor",l:"Ortopédica minor"},{v:"ortopedica_major",l:"Ortopédica major"},{v:"intraperitoneal",l:"Intraperitoneal"},{v:"intratoracica",l:"Intratorácica"},{v:"vascular_sup",l:"Vascular suprainguinal"},{v:"vascular_inf",l:"Vascular infrainguinal"},{v:"neurocirurgia",l:"Neurocirurgia"},{v:"outro",l:"Outro"}]}/></Field>
          <Field label="Opções (Apfel)">
            <div style={{display:"flex",flexDirection:"column",gap:8,paddingTop:4}}>
              <Checkbox label="Fumador activo" checked={apfelOpts.fumador} onChange={v=>setApfelOpts(p=>({...p,fumador:v}))}/>
              <Checkbox label="NVPO prévia / cinetose" checked={apfelOpts.ponv} onChange={v=>setApfelOpts(p=>({...p,ponv:v}))}/>
              <Checkbox label="Opioides pós-op previstos" checked={apfelOpts.opioides} onChange={v=>setApfelOpts(p=>({...p,opioides:v}))}/>
            </div>
          </Field>
        </Grid>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(255px,1fr))",gap:14}}>
        {bmiInfo&&<RiskCard title="Índice de Massa Corporal" score={bmi} level={bmiInfo.label} color={bmiInfo.color} desc={`Altura: ${med.altura} cm — Peso: ${med.peso} kg`}/>}
        {asa&&<RiskCard title="Classificação ASA" level={`ASA ${asa}`} color={asa==="I"?C.green:asa==="II"?C.yellow:asa==="III"?C.orange:C.red} desc={asa==="I"?"Doente saudável":asa==="II"?"Doença sistémica ligeira":asa==="III"?"Doença sistémica grave":asa==="IV"?"Risco de vida constante":"Moribundo / Emergência"}/>}
        <RiskCard title="RCRI — Risco Cardíaco (Lee)" score={rcri.score} pct={rcri.pct} level={rcri.level} color={rcri.color} factors={rcri.factors} desc={rcri.score===0?"Risco cardíaco perioperatório muito baixo":undefined}/>
        <RiskCard title="Risco de Via Aérea Difícil" level={airwayRisk.level} color={airwayRisk.color} desc={airwayRisk.desc} factors={[via.mallampati?`Mallampati ${via.mallampati}`:null,via.abertura?`Abertura: ${via.abertura}`:null,via.mobilidade?`Cervical: ${via.mobilidade.replace("_"," ")}`:null,via.dtm?`DTM: ${via.dtm}`:null].filter(Boolean)}/>
        {apfel&&<RiskCard title="Score de Apfel (NVPO)" score={apfel.score} pct={apfel.risk} level={apfel.level} color={apfel.color} factors={[pid.sexo==="F"?"Sexo feminino":null,!apfelOpts.fumador?"Não fumador":null,apfelOpts.ponv?"NVPO prévia":null,apfelOpts.opioides?"Opioides previstos":null].filter(Boolean)}/>}
      </div>
      <div style={cSt}><div style={sTSt}>Plano Anestésico</div>
        <Txt value={plano} onChange={setPlano} rows={4} placeholder="Técnica proposta, monitorização, acessos, estratégia via aérea, profilaxia NVPO, analgesia pós-op..."/>
      </div>
    </div>,
  ];

  return <>
    {/* Screen */}
    <div className="no-print" style={{minHeight:"100vh",background:C.bg}}>
      {/* Header */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 22px",
        display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,borderRadius:10,background:`${C.accent}20`,border:`1px solid ${C.accent}40`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚕</div>
          <div>
            <div style={{fontFamily:C.head,fontSize:14,fontWeight:800,color:C.textBright,letterSpacing:"0.04em"}}>CONSULTA PRÉ-ANESTÉSICA</div>
            <div style={{fontSize:11,color:C.textDim}}>Registo Clínico · saudedigital.store</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {pid.nome&&<div style={{textAlign:"right",marginRight:6}}>
            <div style={{fontFamily:C.head,fontSize:13,color:C.textBright,fontWeight:700}}>{pid.nome}</div>
            <div style={{fontSize:11,color:C.textDim,fontFamily:C.mono}}>{pid.processo&&`Proc. ${pid.processo}`}{idade?` · ${idade} anos`:""}{pid.sexo?` · ${pid.sexo}`:""}</div>
          </div>}
          <button onClick={()=>window.print()}
            style={{background:`${C.green}15`,border:`1px solid ${C.green}40`,borderRadius:8,
              color:C.green,cursor:"pointer",padding:"8px 16px",fontFamily:C.head,fontSize:12,
              fontWeight:700,letterSpacing:"0.06em",display:"flex",alignItems:"center",gap:6}}>
            📄 Exportar PDF
          </button>
        </div>
      </div>
      {/* Tabs */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
        <div style={{display:"flex",padding:"0 20px",minWidth:"fit-content"}}>
          {TABS.map((t,i)=>{const a=tab===i;return(
            <button key={i} onClick={()=>setTab(i)}
              style={{background:"none",border:"none",cursor:"pointer",padding:"14px 17px",
                fontFamily:C.head,fontSize:12,fontWeight:a?700:500,color:a?C.accent:C.textDim,
                letterSpacing:"0.06em",textTransform:"uppercase",whiteSpace:"nowrap",
                borderBottom:a?`2px solid ${C.accent}`:"2px solid transparent",transition:"color .2s"}}>{t}</button>
          );})}
        </div>
      </div>
      {/* Content */}
      <div style={{maxWidth:900,margin:"0 auto",padding:"26px 20px 60px"}}>
        {sections[tab]}
        <div style={{display:"flex",justifyContent:"space-between",marginTop:26}}>
          {tab>0?<Btn variant="ghost" onClick={()=>setTab(t=>t-1)}>← Anterior</Btn>:<div/>}
          {tab<TABS.length-1?<Btn onClick={()=>setTab(t=>t+1)}>Seguinte →</Btn>:<Btn onClick={()=>window.print()}>📄 Exportar PDF</Btn>}
        </div>
      </div>
    </div>

    {/* Print only */}
    <PrintReport pid={pid} idade={idade} bmi={bmi} bmiInfo={bmiInfo} med={med}
      ant={ant} cirurgias={cirurgias} meds={meds} alergias={alergias}
      ecg={ecg} labs={labs} via={via} asa={asa}
      rcri={rcri} airwayRisk={airwayRisk} apfel={apfel} plano={plano}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
